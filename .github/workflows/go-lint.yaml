name: Go Lint

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version for linting'
        required: false
        type: string
        default: '1.26.x'
      golangci-lint-version:
        description: 'golangci-lint version'
        required: false
        type: string
        default: 'latest'
      modules:
        description: 'JSON array of module directories containing go.mod'
        required: false
        type: string
        default: '["."]'
      timeout:
        description: 'Lint timeout'
        required: false
        type: string
        default: '3m'
      args:
        description: 'Additional golangci-lint arguments'
        required: false
        type: string
        default: '--verbose'

permissions:
  contents: read

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.modules) }}
    runs-on: ubuntu-latest
    name: lint (${{ matrix.module }})
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: ${{ inputs.golangci-lint-version }}
        args: --timeout ${{ inputs.timeout }} ${{ inputs.args }}
        working-directory: ${{ matrix.module }}
