name: Swift CI

on:
  workflow_call:
    inputs:
      xcode-version:
        description: 'Xcode version to use'
        required: false
        type: string
        default: 'latest-stable'
      macos-version:
        description: 'macOS runner version'
        required: false
        type: string
        default: 'macos-14'
      working-directory:
        description: 'Directory containing Package.swift'
        required: false
        type: string
        default: '.'
      test-flags:
        description: 'Additional flags for swift test'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ inputs.macos-version }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test ${{ inputs.test-flags }}
