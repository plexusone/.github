name: Go CI

on:
  workflow_call:
    inputs:
      go-versions:
        description: 'JSON array of Go versions to test'
        required: false
        type: string
        default: '["1.26.x"]'
      platforms:
        description: 'JSON array of platforms to test on'
        required: false
        type: string
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      modules:
        description: 'JSON array of module directories containing go.mod'
        required: false
        type: string
        default: '["."]'
      test-flags:
        description: 'Additional flags for go test'
        required: false
        type: string
        default: '-v -covermode=count'

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go-version: ${{ fromJson(inputs.go-versions) }}
        platform: ${{ fromJson(inputs.platforms) }}
        module: ${{ fromJson(inputs.modules) }}
    runs-on: ${{ matrix.platform }}
    name: test (${{ matrix.module }}, ${{ matrix.go-version }}, ${{ matrix.platform }})
    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run tests
      working-directory: ${{ matrix.module }}
      run: go test ${{ inputs.test-flags }} ./...
